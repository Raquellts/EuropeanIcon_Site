<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV - {{NOME}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      color: #2d2d2d;
      line-height: 1.6;
    }

    .page {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 40px 48px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
    }

    .photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #996d1c;
      object-fit: cover;
      flex-shrink: 0;
    }

    .photo-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #996d1c;
      background: rgba(153, 109, 28, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #996d1c;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .header-info .role {
      font-size: 16px;
      color: #996d1c;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .header-info .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }

    .header-info .contact-row span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* CONTENT */
    .content {
      padding: 40px 48px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #996d1c;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f0e6c8;
    }

    .section-text {
      font-size: 14px;
      color: #4a4a4a;
    }

    .areas-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      list-style: none;
    }

    .areas-list li {
      background: #f8f4ec;
      color: #8B6914;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #e8dcc8;
    }

    /* Extra info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 24px;
    }

    .info-grid .label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-grid .value {
      font-size: 14px;
      color: #2d2d2d;
    }

    @media print {
      body { background: #fff; }
      .page { margin: 0; max-width: 100%; box-shadow: none; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- HEADER -->
    <div class="header">
      {{FOTO}}
      <div class="header-info">
        <h1>{{NOME}}</h1>
        <div class="role">{{ROLE}}</div>
        <div class="contact-row">
          {{EMAIL}}
          {{CONTATO}}
          {{INSTAGRAM}}
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      {{DESCRIPTION}}

      {{AREAS}}
    </div>
  </div>
</body>
</html>
